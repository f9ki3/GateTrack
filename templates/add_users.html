{% extends "nav.html" %} {% block title %}Add User - GateTrack{% endblock %} {%
block content %}
<div class="row justify-content-center">
  <div class="col-lg-8 col-md-10">
    <div class="card">
      <div class="card-header">
        <h4 class="mb-0"><i class="bi bi-person-plus me-2"></i>Add New User</h4>
      </div>
      <div class="card-body">
        <form method="POST" action="{{ url_for('add_user') }}" id="addUserForm">
          <!-- Role Selection -->
          <div class="mb-4">
            <label for="role" class="form-label">
              <i class="bi bi-person-badge me-1"></i>User Role
              <span class="text-danger">*</span>
            </label>
            <select
              class="form-select"
              id="role"
              name="role"
              required
              onchange="toggleCredentials()"
            >
              <option value="" selected disabled>Select user role...</option>
              <option value="super_admin">Super Admin</option>
              <option value="teacher">Teacher</option>
              <option value="staff">Staff</option>
              <option value="technician">Technician</option>
              <option value="guest">Guest</option>
            </select>
            <div class="form-text">Select the role for the new user</div>
          </div>

          <!-- Credentials Section (only for Teacher) -->
          <div id="credentialsSection" style="display: none">
            <h5 class="mb-3 text-primary">
              <i class="bi bi-key me-1"></i>Login Credentials
            </h5>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="username" class="form-label">
                  Username <span class="text-danger">*</span>
                </label>
                <input
                  type="text"
                  class="form-control"
                  id="username"
                  name="username"
                  placeholder="Enter username"
                />
              </div>
              <div class="col-md-6 mb-3">
                <label for="password" class="form-label">
                  Password <span class="text-danger">*</span>
                </label>
                <div class="input-group">
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    placeholder="Enter password"
                  />
                  <button
                    class="btn btn-outline-secondary"
                    type="button"
                    id="togglePassword"
                    aria-label="Toggle password visibility"
                  >
                    <i class="bi bi-eye-slash" id="togglePasswordIcon"></i>
                  </button>
                </div>
              </div>
            </div>
            <hr class="my-4" />
          </div>

          <!-- Personal Information -->
          <h5 class="mb-3 text-primary">
            <i class="bi bi-person me-1"></i>Personal Information
          </h5>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="first_name" class="form-label"> First Name </label>
              <input
                type="text"
                class="form-control"
                id="first_name"
                name="first_name"
                placeholder="Enter first name"
              />
            </div>
            <div class="col-md-6 mb-3">
              <label for="last_name" class="form-label"> Last Name </label>
              <input
                type="text"
                class="form-control"
                id="last_name"
                name="last_name"
                placeholder="Enter last name"
              />
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="email" class="form-label">
                Email <span class="text-danger">*</span>
              </label>
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                placeholder="Enter email address"
                required
              />
            </div>
            <div class="col-md-6 mb-3">
              <label for="contact" class="form-label"> Contact Number </label>
              <input
                type="text"
                class="form-control"
                id="contact"
                name="contact"
                placeholder="Enter contact number"
              />
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="gender" class="form-label"> Gender </label>
              <select class="form-select" id="gender" name="gender">
                <option value="" selected>Select gender...</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>

          <!-- RFID (Required for Student and Guest) -->
          <div class="mb-4">
            <label for="rfid" class="form-label">
              <i class="bi bi-upc me-1"></i>RFID Tag
              <span class="text-danger">*</span>
            </label>
            <input
              type="text"
              class="form-control"
              id="rfid"
              name="rfid"
              placeholder="Scan or enter RFID tag"
              required
            />
            <div class="form-text">Required for attendance tracking</div>
          </div>

          <!-- Form Actions -->
          <div class="d-flex justify-content-between">
            <a href="{{ url_for('users') }}" class="btn btn-outline-secondary">
              <i class="bi bi-arrow-left me-1"></i>Cancel
            </a>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-circle me-1"></i>Add User
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %} {% block scripts %}
<script>
  function toggleCredentials() {
    const roleSelect = document.getElementById("role");
    const credentialsSection = document.getElementById("credentialsSection");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");

    if (
      ["super_admin", "teacher", "staff", "technician"].includes(
        roleSelect.value,
      )
    ) {
      credentialsSection.style.display = "block";
      usernameInput.setAttribute("required", "required");
      passwordInput.setAttribute("required", "required");
    } else {
      credentialsSection.style.display = "none";
      usernameInput.removeAttribute("required");
      passwordInput.removeAttribute("required");
      usernameInput.value = "";
      passwordInput.value = "";
    }
  }

  // Toggle password visibility
  const togglePassword = document.getElementById("togglePassword");
  if (togglePassword) {
    const passwordInput = document.getElementById("password");
    const toggleIcon = document.getElementById("togglePasswordIcon");

    togglePassword.addEventListener("click", function () {
      const type =
        passwordInput.getAttribute("type") === "password" ? "text" : "password";
      passwordInput.setAttribute("type", type);

      if (type === "text") {
        toggleIcon.classList.remove("bi-eye-slash");
        toggleIcon.classList.add("bi-eye");
      } else {
        toggleIcon.classList.remove("bi-eye");
        toggleIcon.classList.add("bi-eye-slash");
      }
    });
  }

  // Form validation
  document
    .getElementById("addUserForm")
    .addEventListener("submit", function (event) {
      const role = document.getElementById("role").value;

      if (["super_admin", "teacher", "staff", "technician"].includes(role)) {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        if (!username || !password) {
          event.preventDefault();
          alert(
            "Username and Password are required for " +
              role.charAt(0).toUpperCase() +
              role.slice(1) +
              " role.",
          );
        }
      }
    });
</script>
{% endblock %}
